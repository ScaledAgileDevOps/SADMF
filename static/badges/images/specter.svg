<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="SADMF SPECTER Agent Certification Badge">
  <defs>
    <linearGradient id="sp-silver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f2f2f5"/>
      <stop offset="40%" stop-color="#b8b8cc"/>
      <stop offset="100%" stop-color="#585870"/>
    </linearGradient>
    <radialGradient id="sp-space" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#0e1645"/>
      <stop offset="100%" stop-color="#050810"/>
    </radialGradient>
    <linearGradient id="sp-bar1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#44ff99"/>
      <stop offset="100%" stop-color="#006633"/>
    </linearGradient>
    <linearGradient id="sp-bar2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#44ccff"/>
      <stop offset="100%" stop-color="#004488"/>
    </linearGradient>
    <filter id="sp-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Silver outer rounded rectangle -->
  <rect x="20" y="20" width="216" height="216" rx="14" ry="14" fill="url(#sp-silver)"/>

  <!-- Dark space inner -->
  <rect x="30" y="30" width="196" height="196" rx="8" ry="8" fill="url(#sp-space)"/>

  <!-- Electric blue accent border -->
  <rect x="37" y="37" width="182" height="182" rx="5" ry="5" fill="none" stroke="#0077dd" stroke-width="2"/>

  <!-- Thin silver detail border -->
  <rect x="34" y="34" width="188" height="188" rx="7" ry="7" fill="none" stroke="#b8b8cc" stroke-width="0.75" opacity="0.55"/>

  <!-- SADMF text at top -->
  <text x="128" y="63" text-anchor="middle"
        font-family="Georgia,'Palatino Linotype',serif"
        font-size="17" font-weight="bold" fill="#c8d8f0" letter-spacing="6"
        stroke="#003090" stroke-width="0.5">SADMF</text>

  <!-- Rule under SADMF -->
  <line x1="55" y1="70" x2="201" y2="70" stroke="#3366aa" stroke-width="0.75" opacity="0.6"/>

  <!-- Baseline for bar chart -->
  <line x1="66" y1="168" x2="196" y2="168" stroke="#3366aa" stroke-width="1.5" opacity="0.7"/>

  <!-- Bar 1 (shortest) -->
  <rect x="72" y="148" width="22" height="20" rx="2"
        fill="url(#sp-bar1)" opacity="0.7"/>
  <rect x="72" y="148" width="22" height="20" rx="2"
        fill="none" stroke="#00ff88" stroke-width="1" filter="url(#sp-glow)" opacity="0.6"/>

  <!-- Bar 2 -->
  <rect x="102" y="132" width="22" height="36" rx="2"
        fill="url(#sp-bar1)" opacity="0.75"/>
  <rect x="102" y="132" width="22" height="36" rx="2"
        fill="none" stroke="#00ff88" stroke-width="1" filter="url(#sp-glow)" opacity="0.6"/>

  <!-- Bar 3 -->
  <rect x="132" y="110" width="22" height="58" rx="2"
        fill="url(#sp-bar2)" opacity="0.8"/>
  <rect x="132" y="110" width="22" height="58" rx="2"
        fill="none" stroke="#44aaff" stroke-width="1" filter="url(#sp-glow)" opacity="0.6"/>

  <!-- Bar 4 (tallest) -->
  <rect x="162" y="88" width="22" height="80" rx="2"
        fill="url(#sp-bar2)" opacity="0.9"/>
  <rect x="162" y="88" width="22" height="80" rx="2"
        fill="none" stroke="#44aaff" stroke-width="1.5" filter="url(#sp-glow)"/>

  <!-- Ghost glow layer behind bars (specter effect) -->
  <rect x="70" y="146" width="26" height="24" rx="3"
        fill="#00ff88" opacity="0.04" filter="url(#sp-glow)"/>
  <rect x="100" y="130" width="26" height="40" rx="3"
        fill="#00ff88" opacity="0.04" filter="url(#sp-glow)"/>
  <rect x="130" y="108" width="26" height="62" rx="3"
        fill="#00aaff" opacity="0.05" filter="url(#sp-glow)"/>
  <rect x="160" y="86" width="26" height="84" rx="3"
        fill="#00aaff" opacity="0.07" filter="url(#sp-glow)"/>

  <!-- Trend line over bars -->
  <polyline points="83,148 113,132 143,110 173,88"
            fill="none" stroke="#ffdd44" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>

  <!-- Circuit decoration — bottom left -->
  <g stroke="#00ff88" stroke-width="0.8" fill="none" opacity="0.35">
    <line x1="50" y1="155" x2="65" y2="155"/>
    <line x1="65" y1="155" x2="65" y2="168"/>
    <circle cx="50" cy="155" r="2" fill="#00ff88"/>
  </g>

  <!-- Rule above label -->
  <line x1="55" y1="194" x2="201" y2="194" stroke="#3366aa" stroke-width="0.75" opacity="0.6"/>

  <!-- SPECTER label -->
  <text x="128" y="213" text-anchor="middle"
        font-family="Georgia,'Palatino Linotype',serif"
        font-size="12" font-weight="bold" fill="#88bbff" letter-spacing="2.5">SPECTER</text>
</svg>
