<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="SADMF AUTOMATON Agent Certification Badge">
  <defs>
    <linearGradient id="au-silver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f2f2f5"/>
      <stop offset="40%" stop-color="#b8b8cc"/>
      <stop offset="100%" stop-color="#585870"/>
    </linearGradient>
    <radialGradient id="au-space" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#0e1645"/>
      <stop offset="100%" stop-color="#050810"/>
    </radialGradient>
    <filter id="au-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Silver outer rounded rectangle -->
  <rect x="20" y="20" width="216" height="216" rx="14" ry="14" fill="url(#au-silver)"/>

  <!-- Dark space inner -->
  <rect x="30" y="30" width="196" height="196" rx="8" ry="8" fill="url(#au-space)"/>

  <!-- Electric blue accent border -->
  <rect x="37" y="37" width="182" height="182" rx="5" ry="5" fill="none" stroke="#0077dd" stroke-width="2"/>

  <!-- Thin silver detail border -->
  <rect x="34" y="34" width="188" height="188" rx="7" ry="7" fill="none" stroke="#b8b8cc" stroke-width="0.75" opacity="0.55"/>

  <!-- SADMF text at top -->
  <text x="128" y="63" text-anchor="middle"
        font-family="Georgia,'Palatino Linotype',serif"
        font-size="17" font-weight="bold" fill="#c8d8f0" letter-spacing="6"
        stroke="#003090" stroke-width="0.5">SADMF</text>

  <!-- Rule under SADMF -->
  <line x1="55" y1="70" x2="201" y2="70" stroke="#3366aa" stroke-width="0.75" opacity="0.6"/>

  <!-- Antenna -->
  <line x1="128" y1="82" x2="128" y2="96" stroke="#00ff88" stroke-width="2" stroke-linecap="round"/>
  <circle cx="128" cy="79" r="4" fill="#00ff88" filter="url(#au-glow)"/>
  <circle cx="128" cy="79" r="7" fill="none" stroke="#00ff88" stroke-width="1" opacity="0.5"/>

  <!-- Robot head (rounded rectangle) -->
  <rect x="80" y="96" width="96" height="78" rx="8" ry="8"
        fill="#001428" stroke="#00aaff" stroke-width="2.5" filter="url(#au-glow)"/>

  <!-- Left eye (rectangular, glowing) -->
  <rect x="92" y="108" width="28" height="20" rx="3" ry="3"
        fill="#001a0a" stroke="#00ff88" stroke-width="1.5" filter="url(#au-glow)"/>
  <rect x="98" y="113" width="16" height="10" rx="1" fill="#00ff88" opacity="0.7" filter="url(#au-glow)"/>

  <!-- Right eye (rectangular, glowing) -->
  <rect x="136" y="108" width="28" height="20" rx="3" ry="3"
        fill="#001a0a" stroke="#00ff88" stroke-width="1.5" filter="url(#au-glow)"/>
  <rect x="142" y="113" width="16" height="10" rx="1" fill="#00ff88" opacity="0.7" filter="url(#au-glow)"/>

  <!-- Nose indicator (small centered dot) -->
  <circle cx="128" cy="135" r="3" fill="#00aaff" opacity="0.7"/>

  <!-- Mouth — grid pattern (speaker grille) -->
  <rect x="94" y="143" width="68" height="20" rx="3" ry="3"
        fill="#000c20" stroke="#00aaff" stroke-width="1.2"/>
  <!-- Grille lines vertical -->
  <g stroke="#00aaff" stroke-width="0.8" opacity="0.5">
    <line x1="104" y1="143" x2="104" y2="163"/>
    <line x1="114" y1="143" x2="114" y2="163"/>
    <line x1="124" y1="143" x2="124" y2="163"/>
    <line x1="134" y1="143" x2="134" y2="163"/>
    <line x1="144" y1="143" x2="144" y2="163"/>
    <line x1="154" y1="143" x2="154" y2="163"/>
  </g>
  <!-- Grille lines horizontal -->
  <g stroke="#00aaff" stroke-width="0.8" opacity="0.5">
    <line x1="94" y1="150" x2="162" y2="150"/>
    <line x1="94" y1="157" x2="162" y2="157"/>
  </g>

  <!-- Circuit traces on head sides -->
  <g stroke="#00ff88" stroke-width="0.8" fill="none" opacity="0.3">
    <line x1="80" y1="110" x2="68" y2="110"/>
    <line x1="68" y1="110" x2="68" y2="130"/>
    <circle cx="68" cy="130" r="2.5" fill="#00ff88"/>
    <line x1="176" y1="110" x2="188" y2="110"/>
    <line x1="188" y1="110" x2="188" y2="130"/>
    <circle cx="188" cy="130" r="2.5" fill="#00ff88"/>
  </g>

  <!-- Rule above label -->
  <line x1="55" y1="194" x2="201" y2="194" stroke="#3366aa" stroke-width="0.75" opacity="0.6"/>

  <!-- AUTOMATON label -->
  <text x="128" y="213" text-anchor="middle"
        font-family="Georgia,'Palatino Linotype',serif"
        font-size="10" font-weight="bold" fill="#88bbff" letter-spacing="2">AUTOMATON</text>
</svg>
