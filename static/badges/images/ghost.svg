<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="SADMF GHOST Agent Certification Badge">
  <defs>
    <linearGradient id="gh-silver" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f2f2f5"/>
      <stop offset="40%" stop-color="#b8b8cc"/>
      <stop offset="100%" stop-color="#585870"/>
    </linearGradient>
    <radialGradient id="gh-space" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#0e1645"/>
      <stop offset="100%" stop-color="#050810"/>
    </radialGradient>
    <linearGradient id="gh-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#44ff99"/>
      <stop offset="100%" stop-color="#00aa55"/>
    </linearGradient>
    <filter id="gh-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Silver outer rounded rectangle -->
  <rect x="20" y="20" width="216" height="216" rx="14" ry="14" fill="url(#gh-silver)"/>

  <!-- Dark space inner -->
  <rect x="30" y="30" width="196" height="196" rx="8" ry="8" fill="url(#gh-space)"/>

  <!-- Electric blue accent border -->
  <rect x="37" y="37" width="182" height="182" rx="5" ry="5" fill="none" stroke="#0077dd" stroke-width="2"/>

  <!-- Thin silver detail border -->
  <rect x="34" y="34" width="188" height="188" rx="7" ry="7" fill="none" stroke="#b8b8cc" stroke-width="0.75" opacity="0.55"/>

  <!-- SADMF text at top -->
  <text x="128" y="63" text-anchor="middle"
        font-family="Georgia,'Palatino Linotype',serif"
        font-size="17" font-weight="bold" fill="#c8d8f0" letter-spacing="6"
        stroke="#003090" stroke-width="0.5">SADMF</text>

  <!-- Rule under SADMF -->
  <line x1="55" y1="70" x2="201" y2="70" stroke="#3366aa" stroke-width="0.75" opacity="0.6"/>

  <!-- Ghost body fill (translucent) -->
  <path d="M 92,120 A 36,32 0 0,1 164,120 L 164,158 Q 148,175 128,158 Q 108,175 92,158 Z"
        fill="#00aa55" opacity="0.12"/>

  <!-- Ghost body outline with glow -->
  <path d="M 92,120 A 36,32 0 0,1 164,120 L 164,158 Q 148,175 128,158 Q 108,175 92,158 Z"
        fill="none" stroke="url(#gh-green)" stroke-width="2.5" filter="url(#gh-glow)"/>

  <!-- Left glowing eye -->
  <circle cx="113" cy="117" r="7" fill="#001a08" stroke="#00ff88" stroke-width="1.5" filter="url(#gh-glow)"/>
  <circle cx="113" cy="117" r="3" fill="#00ff88" opacity="0.9"/>

  <!-- Right glowing eye -->
  <circle cx="143" cy="117" r="7" fill="#001a08" stroke="#00ff88" stroke-width="1.5" filter="url(#gh-glow)"/>
  <circle cx="143" cy="117" r="3" fill="#00ff88" opacity="0.9"/>

  <!-- Circuit traces connecting eyes to base node -->
  <g stroke="#00ff88" stroke-width="0.9" fill="none" opacity="0.4">
    <line x1="113" y1="124" x2="113" y2="140"/>
    <line x1="113" y1="140" x2="128" y2="140"/>
    <line x1="143" y1="124" x2="143" y2="140"/>
    <line x1="143" y1="140" x2="128" y2="140"/>
    <circle cx="128" cy="140" r="2.5" fill="#00ff88"/>
    <line x1="128" y1="142" x2="128" y2="152"/>
    <circle cx="128" cy="152" r="2" fill="#00ff88"/>
  </g>

  <!-- Rule above label -->
  <line x1="55" y1="194" x2="201" y2="194" stroke="#3366aa" stroke-width="0.75" opacity="0.6"/>

  <!-- GHOST label -->
  <text x="128" y="213" text-anchor="middle"
        font-family="Georgia,'Palatino Linotype',serif"
        font-size="13" font-weight="bold" fill="#88bbff" letter-spacing="3">GHOST</text>
</svg>
