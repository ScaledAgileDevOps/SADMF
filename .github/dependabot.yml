# Dependabot version updates are disabled — dependency updates are managed by
# Renovate (see renovate.json). Dependabot alerts remain enabled separately.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
  # scripts/ has its own package.json for the badge issuer tool
  - package-ecosystem: "npm"
    directory: "/scripts"
    schedule:
      interval: "weekly"

